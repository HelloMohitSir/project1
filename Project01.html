<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!-- Specifies character encoding for the document -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Ensures proper scaling on mobile devices -->
    <title>Simple Webpage</title> <!-- The title of the webpage, shown in the browser tab -->
</head>
<body>
    <h1>Welcome to My Simple Webpage</h1> <!-- Main heading of the page -->
    <p>This is a basic HTML webpage.</p> <!-- A paragraph of text -->
</body>
</html>
